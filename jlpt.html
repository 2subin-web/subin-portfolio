<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JLPT Word Game</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Noto Sans KR", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #fff1f2, #fdf2f8, #eef2ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.game-box {
    width: 450px;
    padding: 36px;
    background: rgba(255,255,255,0.88);
    border: 2px solid #f9a8d4;
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(190, 80, 120, 0.2);
    text-align: center;
}

.tag {
    display: inline-block;
    padding: 7px 16px;
    border-radius: 999px;
    background: #ffe4e6;
    color: #be123c;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 14px;
}

h1 {
    margin: 0 0 8px;
    color: #9f1239;
}

.sub-title {
    color: #777;
    font-size: 14px;
    margin-bottom: 20px;
}

.lang-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
}

.lang-buttons button {
    background: #fff;
    border: 1px solid #f9a8d4;
    color: #9f1239;
}

.card {
    background: #fff7fb;
    border-radius: 22px;
    padding: 26px 20px;
    margin-bottom: 20px;
    border: 1px solid #fbcfe8;
}

#question {
    font-size: 22px;
    color: #111;
    line-height: 1.5;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 15px;
    border-radius: 16px;
    border: 1px solid #f9a8d4;
    font-size: 16px;
    text-align: center;
    outline: none;
}

.buttons {
    display: flex;
    gap: 10px;
    margin-top: 16px;
}

button {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 16px;
    font-weight: bold;
    cursor: pointer;
}

.check-btn {
    background: #fb7185;
    color: white;
}

.next-btn {
    background: #fce7f3;
    color: #9f1239;
}

.back-btn {
    background: #111827;
    color: white;
}

#result {
    min-height: 30px;
    margin-top: 18px;
    font-weight: bold;
    color: #be123c;
    white-space: pre-line;
}

.footer {
    margin-top: 18px;
    font-size: 12px;
    color: #999;
}
</style>
</head>

<body>

<div class="game-box">
    <div class="tag">JLPT N2 QUIZ</div>

    <h1 id="title">JLPT 단어 게임</h1>
    <div class="sub-title" id="subtitle">정답을 입력해 주세요 🌸</div>

    <div class="lang-buttons">
        <button onclick="changeLang('ko')">한국어</button>
        <button onclick="changeLang('en')">English</button>
    </div>

    <div class="card">
        <h2 id="question"></h2>
    </div>

    <input type="text" id="answer" placeholder="정답 입력...">

    <div class="buttons">
        <button class="check-btn" id="checkBtn" onclick="checkAnswer()">정답 확인</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제</button>
        <button class="back-btn" onclick="location.href='blog.html'">나가기</button>
    </div>

    <p id="result"></p>

    <div class="footer">made by Subin ☕</div>
</div>

let random = 0;

function changeLang(lang) {
    currentLang = lang;

    document.getElementById("title").innerText = uiText[lang].title;
    document.getElementById("subtitle").innerText = uiText[lang].subtitle;
    document.getElementById("answer").placeholder = uiText[lang].placeholder;
    document.getElementById("checkBtn").innerText = uiText[lang].check;
    document.getElementById("nextBtn").innerText = uiText[lang].next;
    document.getElementById("result").innerText = "";

    showQuestion();
}

function showQuestion() {
    document.getElementById("question").innerText =
        uiText[currentLang].questionStart +
        words[random] +
        uiText[currentLang].questionEnd;
}

function nextQuestion() {
    random = Math.floor(Math.random() * words.length);
    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
    showQuestion();
}

function checkAnswer() {
    const userAnswer = document.getElementById("answer").value.trim().toLowerCase();
    const correctAnswer = meanings[random].toLowerCase();

    if (userAnswer === correctAnswer) {
        document.getElementById("result").innerText = uiText[currentLang].correct;
    } else {
        document.getElementById("result").innerText =
            uiText[currentLang].wrong + meanings[random];
    }
}

document.getElementById("answer").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        checkAnswer();
    }
});

changeLang("ko");
