<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>日本語 単語帳</title>
    <link rel="stylesheet" href="word.css">
</head>
<body>

<div class="word-page">

    <section class="word-hero">
        <div class="hero-text">
            <p class="tag">JLPT N2</p>
            <h1>日本語 単語帳</h1>
            <p>매일 일본어 단어를 기록하고 복습하는 공간</p>
        </div>
    </section>

    <section class="word-stats">
        <div class="stat-card">총 단어<br><strong>125</strong></div>
        <div class="stat-card">오늘 학습<br><strong>12</strong></div>
        <div class="stat-card">복습 필요<br><strong>8</strong></div>
    </section>

    <section class="word-table-box">
        <div class="table-header">
            <h2>단어장 <span>単語帳</span></h2>
            <button>+ 새 단어 추가</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>단어</th>
                    <th>읽기</th>
                    <th>뜻</th>
                    <th>메모</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>表す</td>
                    <td>あらわす</td>
                    <td>나타내다, 표현하다</td>
                    <td>N2 필수 단어</td>
                </tr>
                <tr>
                    <td>価値</td>
                    <td>かち</td>
                    <td>가치</td>
                    <td>명사</td>
                </tr>
                <tr>
                    <td>経験</td>
                    <td>けいけん</td>
                    <td>경험</td>
                    <td>よく使う</td>
                </tr>
            </tbody>
        </table>
    </section>

</div>

</body>
</html>
